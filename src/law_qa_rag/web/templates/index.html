{% extends "base.html" %}

{% block title %}Задать вопрос | RAG по федеральным нормативным актам{% endblock %}

{% block content %}
  <section class="frame" id="frame-question">
    <header class="topbar">
      <a class="logo" href="{{ url_for('index') }}">RAG по федеральным нормативным актам</a>
      <nav class="menu" aria-label="Навигация">
        <a href="{{ url_for('index') }}">Главная</a>
        <a href="#examples">Примеры</a>
      </nav>
    </header>

    <main class="question-main">
      <form class="ask-form" method="post" action="{{ url_for('ask') }}" data-ask-form>
        <textarea
          class="question-input"
          name="question"
          placeholder="Введите юридический вопрос…"
          required
        >{{ question or "" }}</textarea>
        {% if error %}
          <p class="error">{{ error }}</p>
        {% endif %}
        <div>
          <button class="btn" type="submit" data-loading-label="Формируем...">
            <span>Получить ответ</span>
          </button>
        </div>
      </form>

      <div class="chips" id="examples">
        {% for example in examples %}
          <form method="post" action="{{ url_for('ask') }}" data-ask-form>
            <input type="hidden" name="question" value="{{ example }}">
            <button class="chip" type="submit" data-loading-label="Формируем ответ...">
              <span>{{ example }}</span>
            </button>
          </form>
        {% endfor %}
      </div>
    </main>

    <footer class="frame-footer">
      {{ disclaimer }}
    </footer>
  </section>
{% endblock %}
