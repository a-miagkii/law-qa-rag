<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RAG по федеральным нормативным актам{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v=3">
    <script src="{{ url_for('static', path='/app.js') }}?v=3" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">RAG по федеральным нормативным актам</a>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <footer class="disclaimer">
      {{ disclaimer }}
    </footer>
  </body>
</html>
