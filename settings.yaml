project:
  name: law_qa_rag

embedding:
  embedding_model: BAAI/bge-m3
  embedding_dim: 1024

chunking:
  default_profile: base
  min_chunk_size_tokens: 100
  include_act_title: true
  include_path: true
  long_node_min_body_tokens: 50
  header_reserve_tokens: 80

  small:
    chunk_size_tokens: 500
    overlap_tokens: 80

  base:
    chunk_size_tokens: 800
    overlap_tokens: 120

  large:
    chunk_size_tokens: 1200
    overlap_tokens: 150

llm:
  provider: gigachat
  model: null
  temperature: 0
  max_output_tokens: 2500
  context_token_budget: 5000
  prompt_version: answer_v1

retrieval:
  method: weighted_hybrid
  top_k: 10
  candidate_limit: 50
  rrf_k: 60
  sparse_weight: 0.5
  dense_weight: 0.5

database:
  host: localhost
  port: 5433
  dbname: rag_laws
  user: rag_user
